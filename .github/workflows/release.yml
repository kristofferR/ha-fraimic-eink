name: Release

# Tag a version (v1.3.0) to publish a GitHub release with generated notes.
# HACS installs from the tag itself (content_in_root: false), so no zip
# asset is required; the release exists for changelogs and version pinning.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check manifest version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(jq -r .version custom_components/fraimic/manifest.json)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match manifest version $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
