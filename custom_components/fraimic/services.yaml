send_scene:
  name: Send scene
  description: >-
    Push a Fraimic scene's mapped images to their assigned frames all at once.
    Scenes are created in the Fraimic panel.
  fields:
    name:
      name: Scene name
      description: Name of the scene (case-insensitive).
      required: true
      example: Morning wall
      selector:
        text:

render_screen:
  name: Render screen
  description: >-
    Render a dashboard screen (widgets in layout slots) from Home Assistant
    data and display it on the frame — or preview it without uploading.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to render to. Only required if you have more than
        one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    screen:
      name: Screen definition
      description: >-
        The screen as YAML: a layout (full, half_horizontal, half_vertical or
        quadrant) and one widget per slot. Widget types: clock, date, stat,
        entities, template, weather_current, weather_forecast, calendar, todo,
        chart, gauge, progress, image. Or "kind: picture" with a url/entity
        for a full-bleed image (e.g. a dashboard-screenshot add-on URL).
        Provide either this or "Stored screen", not both.
      required: false
      example: >-
        layout: quadrant

        widgets:
          - type: clock
            slot: top_left
          - type: stat
            slot: top_right
            entity: sensor.outdoor_temperature
            trend: true
          - type: entities
            slot: bottom_left
            entities:
              - sensor.indoor_temperature
              - sensor.indoor_humidity
          - type: template
            slot: bottom_right
            template: "{{ states('sensor.energy_today') }} kWh used today"
      selector:
        object:
    screen_id:
      name: Stored screen
      description: >-
        The id or name of a screen created in the integration's UI ("Add
        dashboard screen" on the frame's device page). Alternative to an
        inline screen definition — provide exactly one of the two.
      required: false
      example: Gangen
      selector:
        text:
    preview_only:
      name: Preview only
      description: >-
        Render only to the Screen preview image entity without uploading to
        the frame — iterate on a design without spending ~30 s e-ink refreshes
        and battery.
      required: false
      default: false
      selector:
        boolean:

upload_image:
  name: Upload image
  description: >-
    Convert an ordinary image (file, URL, or camera/image entity) to the
    Fraimic .bin format and display it on the frame. Provide exactly one image
    source.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to upload to. Only required if you have more than
        one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    path:
      name: File path
      description: >-
        Local path to an image file (must be inside an allowlisted directory,
        e.g. /config/www/...).
      required: false
      example: /config/www/art/sunset.jpg
      selector:
        text:
    url:
      name: Image URL
      description: HTTP(S) URL of an image to download and display.
      required: false
      example: https://example.com/art.png
      selector:
        text:
    image_entity_id:
      name: Camera / image entity
      description: A camera or image entity whose current frame should be displayed.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    library_image_id:
      name: Library image
      description: >-
        ID of an image in the Fraimic media library. Library sends reuse the
        cached conversion and honour any crop saved for this frame's resolution.
      required: false
      example: 3f9a1c2b4d5e
      selector:
        text:
    fit:
      name: Fit mode
      description: >-
        How to scale the source image to the frame's resolution (any source size
        is accepted and scaled). Fill crops, Fit keeps the whole image (white
        bars), Stretch ignores aspect ratio.
      required: false
      default: cover
      selector:
        select:
          options:
            - label: Fill — crop to fill (default)
              value: cover
            - label: Fit — keep aspect, white bars
              value: contain
            - label: Fit — keep aspect, black bars
              value: contain_black
            - label: Stretch — ignore aspect ratio
              value: stretch
    rotate:
      name: Rotate
      description: Clockwise rotation applied before fitting.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: "0°"
              value: "0"
            - label: "90°"
              value: "90"
            - label: "180°"
              value: "180"
            - label: "270°"
              value: "270"
    mode:
      name: Dither mode
      description: >-
        How to map the image to the 6 Spectra colours. "Auto" (best general
        result) and the error-diffusion modes suit photos; "Bayer" is fast and
        best for flat graphics/UI; "None" is nearest-colour only.
      required: false
      default: auto
      selector:
        select:
          options:
            - label: Auto (recommended)
              value: auto
            - label: Floyd-Steinberg (photos)
              value: floyd_steinberg
            - label: Atkinson (portraits)
              value: atkinson
            - label: Bayer / ordered (graphics, fast)
              value: bayer
            - label: None (nearest colour)
              value: none
    saturation:
      name: Saturation
      description: >-
        Saturation boost before dithering. Real Spectra 6 owners keep this
        modest (default 1.15) and push contrast instead. 1.0 = no change.
      required: false
      default: 1.15
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
          mode: slider
    contrast:
      name: Contrast
      description: >-
        Contrast boost before dithering. The panel has no backlight, so a strong
        boost (default 1.4) looks best — images look over-contrasty on a monitor
        but right on the frame. 1.0 = no change.
      required: false
      default: 1.4
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
          mode: slider
    sharpen:
      name: Sharpen
      description: >-
        Unsharp-mask strength (0-100, default 80). E-ink + dithering softens
        detail, so mild sharpening helps. 0 disables.
      required: false
      default: 80
      selector:
        number:
          min: 0
          max: 100
          step: 5
          mode: slider
    tone:
      name: Tone curve
      description: >-
        Filmic S-curve strength (0-100, default 25): boosts midtone contrast while
        rolling off shadows/highlights so detail survives the panel's limited
        dynamic range instead of clipping. 0 disables.
      required: false
      default: 25
      selector:
        number:
          min: 0
          max: 100
          step: 5
          mode: slider
