upload_image:
  name: Upload image
  description: >-
    Convert an ordinary image (file, URL, or camera/image entity) to the
    Fraimic .bin format and display it on the frame. Provide exactly one image
    source.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to upload to. Only required if you have more than
        one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    path:
      name: File path
      description: >-
        Local path to an image file (must be inside an allowlisted directory,
        e.g. /config/www/...).
      required: false
      example: /config/www/art/sunset.jpg
      selector:
        text:
    url:
      name: Image URL
      description: HTTP(S) URL of an image to download and display.
      required: false
      example: https://example.com/art.png
      selector:
        text:
    image_entity_id:
      name: Camera / image entity
      description: A camera or image entity whose current frame should be displayed.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    fit:
      name: Fit mode
      description: How to fit the source image onto the 1200x1600 portrait display.
      required: false
      default: cover
      selector:
        select:
          options:
            - label: Cover (crop to fill)
              value: cover
            - label: Contain (pad with white)
              value: contain
            - label: Stretch
              value: stretch
    rotate:
      name: Rotate
      description: Clockwise rotation applied before fitting.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: "0°"
              value: "0"
            - label: "90°"
              value: "90"
            - label: "180°"
              value: "180"
            - label: "270°"
              value: "270"
    dither:
      name: Dither
      description: >-
        Apply Floyd-Steinberg dithering to the 6-colour Spectra palette.
        Recommended for photos.
      required: false
      default: true
      selector:
        boolean:
