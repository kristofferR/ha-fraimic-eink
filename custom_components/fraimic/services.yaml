send_scene:
  name: Send scene
  description: >-
    Push a Fraimic scene's mapped images to their assigned frames all at once.
    Scenes are created in the Fraimic panel.
  fields:
    name:
      name: Scene name
      description: Name of the scene (case-insensitive).
      required: true
      example: Morning wall
      selector:
        text:

show_online_image:
  name: Show online image
  description: >-
    Fetch a fresh image from an online source (museum masterpieces, picture
    of the day, ...) — curated for the e-ink panel — and display it on the
    frame.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to display on. Only required if you have more
        than one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    provider:
      name: Source
      description: >-
        Where to get the image. "shuffle" picks a random museum. Museums
        (met, aic, cleveland, smk, dimu/Nasjonalmuseet, smithsonian) serve
        public-domain masterpieces; wellcome is open-access illustration and
        art; wikimedia, bing and apod are picture-of-the-day sources; nasa
        searches the NASA image archive; picsum is random stock photos.
      required: true
      default: shuffle
      selector:
        select:
          options:
            - label: Surprise me — random museum art
              value: shuffle
            - label: The Met
              value: met
            - label: Art Institute of Chicago
              value: aic
            - label: Cleveland Museum of Art
              value: cleveland
            - label: SMK (National Gallery of Denmark)
              value: smk
            - label: Nasjonalmuseet (DigitaltMuseum)
              value: dimu
            - label: Smithsonian Open Access
              value: smithsonian
            - label: Wellcome Collection
              value: wellcome
            - label: Wikimedia picture of the day
              value: wikimedia
            - label: Bing image of the day
              value: bing
            - label: NASA APOD
              value: apod
            - label: NASA Image Library (searchable)
              value: nasa
            - label: Lorem Picsum (random photos)
              value: picsum
    query:
      name: Search query
      description: >-
        Keyword for sources that support search (unsplash, pexels, nasa,
        smithsonian, wellcome, dimu). Other sources ignore it.
      required: false
      example: northern lights
      selector:
        text:
    caption:
      name: Caption
      description: >-
        Render a small attribution strip (title — artist, source) under the
        image on the panel.
      required: false
      default: false
      selector:
        boolean:
    preview_only:
      name: Preview only
      description: >-
        Fetch and render only to the Screen preview image entity, without
        uploading to the frame.
      required: false
      default: false
      selector:
        boolean:

render_screen:
  name: Render screen
  description: >-
    Render a dashboard screen (widgets in layout slots) from Home Assistant
    data and display it on the frame — or preview it without uploading.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to render to. Only required if you have more than
        one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    screen:
      name: Screen definition
      description: >-
        The screen as YAML: a layout (full, half_horizontal, half_vertical or
        quadrant) and one widget per slot. Widget types: clock, date, stat,
        entities, template, weather_current, weather_forecast, calendar, todo,
        chart, gauge, progress, image. Or "kind: picture" with a url/entity
        for a full-bleed image (e.g. a dashboard-screenshot add-on URL).
        Provide either this or "Stored screen", not both.
      required: false
      example: >-
        layout: quadrant

        widgets:
          - type: clock
            slot: top_left
          - type: stat
            slot: top_right
            entity: sensor.outdoor_temperature
            trend: true
          - type: entities
            slot: bottom_left
            entities:
              - sensor.indoor_temperature
              - sensor.indoor_humidity
          - type: template
            slot: bottom_right
            template: "{{ states('sensor.energy_today') }} kWh used today"
      selector:
        object:
    screen_id:
      name: Stored screen
      description: >-
        The id or name of a screen created in the integration's UI ("Add
        dashboard screen" on the frame's device page). Alternative to an
        inline screen definition — provide exactly one of the two.
      required: false
      example: Gangen
      selector:
        text:
    preview_only:
      name: Preview only
      description: >-
        Render only to the Screen preview image entity without uploading to
        the frame — iterate on a design without spending ~30 s e-ink refreshes
        and battery.
      required: false
      default: false
      selector:
        boolean:

upload_image:
  name: Upload image
  description: >-
    Convert an ordinary image (file, URL, or camera/image entity) to the
    Fraimic .bin format and display it on the frame. Provide exactly one image
    source.
  fields:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to upload to. Only required if you have more than
        one frame configured.
      required: false
      selector:
        config_entry:
          integration: fraimic
    path:
      name: File path
      description: >-
        Local path to an image file (must be inside an allowlisted directory,
        e.g. /config/www/...).
      required: false
      example: /config/www/art/sunset.jpg
      selector:
        text:
    url:
      name: Image URL
      description: HTTP(S) URL of an image to download and display.
      required: false
      example: https://example.com/art.png
      selector:
        text:
    image_entity_id:
      name: Camera / image entity
      description: A camera or image entity whose current frame should be displayed.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    library_image_id:
      name: Library image
      description: >-
        ID of an image in the Fraimic media library. Library sends reuse the
        cached conversion and honour any crop saved for this frame's resolution.
      required: false
      example: 3f9a1c2b4d5e
      selector:
        text:
    fit:
      name: Fit mode
      description: >-
        How to scale the source image to the frame's resolution (any source size
        is accepted and scaled). Fill crops, Fit keeps the whole image (white
        bars), Stretch ignores aspect ratio.
      required: false
      default: cover
      selector:
        select:
          options:
            - label: Fill — crop to fill (default)
              value: cover
            - label: Fit — keep aspect, white bars
              value: contain
            - label: Fit — keep aspect, black bars
              value: contain_black
            - label: Stretch — ignore aspect ratio
              value: stretch
    rotate:
      name: Rotate
      description: Clockwise rotation applied before fitting.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: "0°"
              value: "0"
            - label: "90°"
              value: "90"
            - label: "180°"
              value: "180"
            - label: "270°"
              value: "270"
    mode:
      name: Dither mode
      description: >-
        How to map the image to the 6 Spectra colours. "Auto" (best general
        result) and the error-diffusion modes suit photos; "Bayer" is fast and
        best for flat graphics/UI; "None" is nearest-colour only.
      required: false
      default: auto
      selector:
        select:
          options:
            - label: Auto (recommended)
              value: auto
            - label: Floyd-Steinberg (photos)
              value: floyd_steinberg
            - label: Atkinson (portraits)
              value: atkinson
            - label: Bayer / ordered (graphics, fast)
              value: bayer
            - label: None (nearest colour)
              value: none
    saturation:
      name: Saturation
      description: >-
        Saturation boost before dithering. Real Spectra 6 owners keep this
        modest (default 1.15) and push contrast instead. 1.0 = no change.
      required: false
      default: 1.15
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
          mode: slider
    contrast:
      name: Contrast
      description: >-
        Contrast boost before dithering. The panel has no backlight, so a strong
        boost (default 1.4) looks best — images look over-contrasty on a monitor
        but right on the frame. 1.0 = no change.
      required: false
      default: 1.4
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
          mode: slider
    sharpen:
      name: Sharpen
      description: >-
        Unsharp-mask strength (0-100, default 80). E-ink + dithering softens
        detail, so mild sharpening helps. 0 disables.
      required: false
      default: 80
      selector:
        number:
          min: 0
          max: 100
          step: 5
          mode: slider
    tone:
      name: Tone curve
      description: >-
        Filmic S-curve strength (0-100, default 25): boosts midtone contrast while
        rolling off shadows/highlights so detail survives the panel's limited
        dynamic range instead of clipping. 0 disables.
      required: false
      default: 25
      selector:
        number:
          min: 0
          max: 100
          step: 5
          mode: slider

schedule_send:
  name: Schedule a send
  description: >-
    Send an image to a frame (or activate a scene) at a future time —
    one-shot or recurring daily/weekly/monthly. Fires that miss a sleeping
    frame are queued for its next wake; one-shots missed while Home
    Assistant was down fire once on restart.
  fields:
    at:
      name: When
      description: Date and time of the (first) send.
      required: true
      example: "2026-07-11 07:30:00"
      selector:
        datetime:
    recurrence:
      name: Repeat
      description: How often to repeat the send.
      required: false
      default: none
      selector:
        select:
          options:
            - none
            - daily
            - weekly
            - monthly
    name:
      name: Name
      description: Label shown in listings and the send status sensor.
      required: false
      example: Morning artwork
      selector:
        text:
    config_entry_id:
      name: Frame
      description: >-
        Which Fraimic frame to send to. Only required if you have more than
        one frame configured. Ignored when a scene is given.
      required: false
      selector:
        config_entry:
          integration: fraimic
    scene:
      name: Scene
      description: >-
        Activate this Fraimic scene instead of sending a single image
        (name or id, case-insensitive).
      required: false
      example: Morning wall
      selector:
        text:
    path:
      name: File path
      description: Path to an image file readable by Home Assistant.
      required: false
      example: /config/www/photo.jpg
      selector:
        text:
    url:
      name: URL
      description: HTTP(S) URL of an image to download at fire time.
      required: false
      selector:
        text:
    image_entity:
      name: Camera or image entity
      description: Snapshot this entity at fire time.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    library_image:
      name: Library image
      description: Id of an image in the Fraimic library.
      required: false
      selector:
        text:
    fit:
      name: Fit
      description: Override the frame's fit mode for this send.
      required: false
      selector:
        select:
          options:
            - cover
            - contain
            - stretch
    mode:
      name: Dither mode
      description: Override the frame's dither mode for this send.
      required: false
      selector:
        select:
          options:
            - auto
            - floyd_steinberg
            - atkinson
            - bayer
            - none
    rotate:
      name: Rotate
      description: Override the rotation (degrees) for this send.
      required: false
      selector:
        select:
          options:
            - "0"
            - "90"
            - "180"
            - "270"
    saturation:
      name: Saturation
      description: Override the frame's saturation for this send.
      required: false
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
    contrast:
      name: Contrast
      description: Override the frame's contrast for this send.
      required: false
      selector:
        number:
          min: 0
          max: 3
          step: 0.05
    sharpen:
      name: Sharpen
      description: Override the frame's sharpen amount for this send.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
    tone:
      name: Tone curve
      description: Override the frame's tone-curve strength for this send.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1

cancel_scheduled_send:
  name: Cancel a scheduled send
  description: Cancel one scheduled send by id, or all of them.
  fields:
    event_id:
      name: Event id
      description: The id returned by schedule_send (see list_scheduled_sends).
      required: false
      selector:
        text:
    all:
      name: Cancel all
      description: Cancel every scheduled send.
      required: false
      default: false
      selector:
        boolean:

list_scheduled_sends:
  name: List scheduled sends
  description: >-
    Returns every scheduled send with its id, next fire time, recurrence and
    state (pending / done / target_missing).

update_album:
  name: Update album
  description: >-
    Edit one of the frame's cloud albums (name, description, slideshow
    on/off, playback mode, schedule). Proxied through the frame to the
    Fraimic cloud, so the frame needs internet access. Creating, deleting
    and assigning albums to devices is only possible in the Fraimic app.
  fields:
    config_entry_id:
      name: Frame
      description: Which frame to proxy through. Only required with multiple frames.
      required: false
      selector:
        config_entry:
          integration: fraimic
    album_id:
      name: Album id
      description: The album's id (see the Albums sensor attributes).
      required: true
      selector:
        text:
    name:
      name: Name
      description: New album name.
      required: false
      selector:
        text:
    description:
      name: Description
      description: New album description.
      required: false
      selector:
        text:
    active:
      name: Active
      description: Turn the album's slideshow on or off.
      required: false
      selector:
        boolean:
    playback_mode:
      name: Playback mode
      description: Order images play in.
      required: false
      selector:
        select:
          options:
            - sequential
            - random
    schedule:
      name: Schedule
      description: >-
        Full schedule object — either {"type": "interval", "every": N,
        "unit": "minutes"|"hours"|"days"} or {"type": "specific_days", ...}.
        The cloud replaces the whole schedule, so give the complete shape.
      required: false
      selector:
        object:
